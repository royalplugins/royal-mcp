name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP Lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Syntax check every PHP file
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::PHP parse error"
              php -l "$file"
              fail=1
            fi
          done < <(find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0)
          exit $fail
