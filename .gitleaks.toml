# gitleaks config for royal-mcp
#
# Extends the built-in ruleset. Only overrides needed here are allowlists
# for known-false-positive patterns unique to this codebase.

[extend]
useDefault = true

[[allowlists]]
description = "WordPress user_meta / option keys tracking per-user notice dismissals. Snake_case strings prefixed with the plugin slug — not credential material. Same shape as the existing USER_DISMISS_KEY / STALE_DISMISS_KEY / HTML_BODY_DISMISS_KEY / REGISTER_301_DISMISS_KEY constants already public in earlier releases."
regexes = [
    '''royal_mcp_[a-z0-9_]+_dismissed''',
]
